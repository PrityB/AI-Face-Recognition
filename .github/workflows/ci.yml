name: AI KYC Platform CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-ai-engine:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        cd ai-engine
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest
    - name: Run Tests
      # Dummy out for demo showcase
      run: |
        cd ai-engine
        echo "Running AI Engine Unit Tests..."
        # pytest tests/

  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest
    - name: Run Tests
      run: |
        cd backend
        echo "Running Backend Unit Tests..."

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
    - name: Terraform Init
      run: terraform init
      working-directory: ./infrastructure
    - name: Terraform Validate
      run: terraform validate
      working-directory: ./infrastructure

  build-docker-images:
    needs: [test-ai-engine, test-backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    - name: Build backend
      run: docker build -t ai-kyc/backend -f docker/Dockerfile.backend ./backend
    - name: Build ai-engine
      run: docker build -t ai-kyc/ai-engine -f docker/Dockerfile.ai-engine ./ai-engine
