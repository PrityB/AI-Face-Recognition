version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://kyc_user:securepassword@db:5432/kyc_db
      - AI_ENGINE_URL=http://ai-engine:8001
    depends_on:
      db:
        condition: service_healthy
      ai-engine:
        condition: service_started

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: ../docker/Dockerfile.ai-engine
    ports:
      - "8001:8001"
    # To enable local GPU inference, uncomment these lines if you have nvidia runtime installed:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kyc_user
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: kyc_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyc_user -d kyc_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
